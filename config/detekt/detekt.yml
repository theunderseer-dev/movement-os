build:
  maxIssues: 0
  excludeCorrectable: false

complexity:
  active: true
  LongMethod:
    threshold: 60
  LongParameterList:
    functionThreshold: 6
    constructorThreshold: 7
  TooManyFunctions:
    thresholdInFiles: 15
    thresholdInClasses: 15

style:
  active: true
  MagicNumber:
    active: true
    ignoreNumbers: ['-1', '0', '1', '2', '100']
    ignoreEnums: true
    ignoreAnnotated:
      - 'Composable'
    excludes:
      - '**/theme/Color.kt'
      - '**/theme/Typography.kt'
      - '**/theme/Spacing.kt'
      - '**/theme/Shape.kt'
  MaxLineLength:
    maxLineLength: 140
  WildcardImport:
    active: true
  ForbiddenComment:
    comments:
      - reason: 'Forbidden TODO'
        value: 'TODO:'
      - reason: 'Forbidden FIXME'
        value: 'FIXME:'
      - reason: 'Forbidden STOPSHIP'
        value: 'STOPSHIP'
  UnusedPrivateMember:
    active: true
    ignoreAnnotated:
      - 'Composable'

formatting:
    active: true
    android: true
    Indentation:
        active: false

naming:
  FunctionNaming:
    active: true
    functionPattern: '[a-z][a-zA-Z0-9]*'
    excludeClassPattern: '$^'
    ignoreAnnotated:
      - 'Composable'
